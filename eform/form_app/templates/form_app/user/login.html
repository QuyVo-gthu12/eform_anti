{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - eForm</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        .login-header {
            background: #1e293b;
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .login-header h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .login-header p {
            margin: 5px 0 0;
            color: #94a3b8;
            font-size: 14px;
        }
        .login-body {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .form-control:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #4338ca, #4f46e5);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }
        .alert-error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2>eForm</h2>
            <p>Hệ thống điền và duyệt biểu mẫu</p>
        </div>
        <div class="login-body">
            {% if form.errors %}
                <div class="alert-error">
                    <i class="fa fa-exclamation-circle"></i>
                    <span>Tài khoản hoặc mật khẩu không chính xác.</span>
                </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="id_username">Tên đăng nhập</label>
                    <input type="text" name="username" class="form-control" id="id_username" required autofocus placeholder="Nhập tên đăng nhập...">
                </div>
                <div class="form-group">
                    <label class="form-label" for="id_password">Mật khẩu</label>
                    <input type="password" name="password" class="form-control" id="id_password" required placeholder="Nhập mật khẩu...">
                </div>
                <button type="submit" class="btn-login">
                    <i class="fa fa-sign-in"></i> Đăng nhập
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
